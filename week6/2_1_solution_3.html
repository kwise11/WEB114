<html>
        
    <body>

        <script>

            'use strict';

            button.addEventListener("click", () => alert("1"));
            //adds an event on click of button, gives result 1

            button.removeEventListener("click", () => alert("1"));
            //removes nothing as it is new, needs a handler function to remove

            button.onclick = () => alert(2);
            //adds separate event on click from addEventListener so runs, gives result 2

        </script>

    </body>
    
</html>

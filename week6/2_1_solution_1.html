<!DOCTYPE HTML>

    <html>

        <head>

            <meta charset="utf-8">

        </head>

    <body>

        <input type="button" id="hider" value="Click to hide the text" />

        <div id="text">Text</div>

        <script>
        
        `use strict`

        document.getElementById('hider').onclick = function() {
            document.getElementById('text').hidden = true;
            }

        // call the id hider to apply action to the button itself
        // call the id text to identify what is to be hidden
        // set hidden value to true to hide the words with the id text 

        </script>

    </body>

</html>

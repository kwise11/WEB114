<!DOCTYPE HTML>

    <html>

        <head>

            <meta charset="utf-8">

        </head>

    <body>

        <input type="button" id="hider" value="Click to hide" />

        <script>
        
        `use strict`

        document.getElementById('hider').onclick = function() {
            document.getElementById('hider').hidden = true;
            }

        // call the id hider to apply action to the button itself
        // call the id hider to identify what is to be hidden
        // set hidden value to true to hide the button 

        // can also embedded in html script instead of function

        <input type="button" onclick="this.hidden=true" value="Click to hide">

        </script>

    </body>

</html>

<!DOCTYPE html>
    
<html>
        
    <body>

        <script>

            'use strict';

              let a = 1, b = 1;

              let c = ++a; // prefix increment a so 1+1 = 2 prefix return 2

              let d = b++; // postfix increment b so 1+1 = 2 postfix return 1

              alert(c);

              alert(d);
        
        </script>

    </body>
    
</html>

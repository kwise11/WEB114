<!DOCTYPE html>
    
<html>
        
    <body>

        <script>

            'use strict';

            let a = prompt("First number?", 1);
            let b = prompt("Second number?", 2);

            
            alert(a + b); //12 as concat
            alert(+a + +b); // becomes 1 + 2 = 3 as unary + makes it a number
        
        </script>

    </body>
    
</html>

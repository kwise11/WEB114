<html>
        
    <body>

        <script>

            'use strict';

            function ask(question, yes, no) {
            if (confirm(question)) yes();
            else no();
            }

            ask(
            "Do you agree?",
            function() { alert("You agreed."); },
            function() { alert("You canceled the execution."); }
            );
////////////////////////////////////////////////////////////////////
            
            function ask(question, yes, no) {
            if (confirm(question)) yes();
            else no();
            }

            ask(
            "Do you agree?",
            () => alert("You agreed."),
            () => alert("You canceled the execution.")
            );

            // replacing function() { with () => gives the if true result for that
            //so yes if true gives that alert, so no if true gives that alert
        
        </script>

    </body>
    
</html>

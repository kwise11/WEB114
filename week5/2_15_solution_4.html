<html>
        
    <body>

        <script>

            'use strict';

            function pow (num1, num2) {
                return(num1 ** num2);
            }


            pow(3, 2) = 3 * 3 = 9
            pow(3, 3) = 3 * 3 * 3 = 27
            pow(1, 100) = 1 * 1 * ...* 1 = 1

        
        </script>

    </body>
    
</html>

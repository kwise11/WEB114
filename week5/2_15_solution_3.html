<html>
        
    <body>

        <script>

            'use strict';

            function min(num1, num2) {
                return (num1 < num2) ? num1 : num2;
            }

            min(2, 5) == 2
            min(3, -1) == -1
            min(1, 1) == 1

        
        </script>

    </body>

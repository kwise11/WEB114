<html>
        
    <body>

        <script>

            'use strict';

            for (let i = 0; i < 5; i++) alert( i );
            //first iteration sets i, only runs once
            //alert starts at 1

            for (let i = 0; i < 5; ++i) alert( i );
            //first iteration sets i, only runs once
            //alert starts at 1

            //both are the same as they are all separate
        
        </script>

    </body>
    
</html>

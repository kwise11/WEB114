<!DOCTYPE html>
    
<html>
        
    <body>

        <script>

            'use strict';

            5 > 4                   //true, type match and 5 more than 4
            "apple" > "pineapple"   //false, p unicode greater than a unicode
            "2" > "12"              //true, both string means no type conversion, 1st char compare 2 is greater than 1
            undefined == null       //true, undefined only equals null
            undefined === null      //false, not an exact match
            null == "\n0\n"         //false, null and undefined only equal each other
            null === +"\n0\n"       //false, not an exact match
        
        </script>

    </body>
    
</html>

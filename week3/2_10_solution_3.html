<!DOCTYPE html>
    
<html>
        
    <body>

        <script>

            'use strict';

            let askNumber = prompt(`Please provide a number`,0);

            if (askNumber > 0)
                {
                    alert( 1 );
                } else if (askNumber < 0){
                    alert( -1 );
                } else {
                    alert( 0 );
                }
        
        </script>

    </body>
    
</html>
